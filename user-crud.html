<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User CRUD Test</title>
  <link rel="stylesheet" href="/src/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="bmi.html">BMI Calculator</a>
    <a href="fetch.html">Fetch API</a>
    <a href="user-crud.html">User Management</a>
    <a href="entries.html">Diary</a>
  </nav>

  <main class="container">
    <section class="user-crud-page">
      <header class="user-crud-header">
        <h1>User Management</h1>
        <p>Add users, then load and manage the list.</p>
      </header>

      <section class="user-card">
        <h2>Create User</h2>
        <form id="add-user-form" class="user-form">
          <label for="username">Username</label>
          <input id="username" name="username" type="text" placeholder="Enter username" required />

          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="Enter email" required />

          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Enter password" required />

          <button type="submit" class="btn-primary">Add User</button>
        </form>
      </section>

      <section class="user-card">
        <div class="user-list-toolbar">
          <h2>Users</h2>
          <button id="load-users" class="btn-secondary">Load Users</button>
        </div>
        <div id="user-list"></div>
      </section>
    </section>
  </main>

  <script type="module" src="/src/user-crud.js"></script>
</body>
</html>
